<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas</title>
    <link rel="shortcut icon" href="https://www.flaticon.es/icono-gratis/lista-de-tareas_5058507" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="contenedor">
        <h1>Mi lista de tareas</h1>       
        <div class="entrada-tareas">
            <input type="text" id="nuevaTareaInput" placeholder="¿Qué tienes pendiente?">
            <button id="botonAgregar">Agregar tarea</button>
        </div>
        <ul id="listaDeTareas"></ul>
        <p class="contador">Total de tareas: <span id="contadorTareas">0</span></p>
    </main>
    <footer>
        <p>Desarrollado por: <strong>Ludwing Silva</strong></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
