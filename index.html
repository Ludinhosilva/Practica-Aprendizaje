<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Tareas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="contenedor">
        <h1>Mis Tareas</h1>       
        <div class="entrada-tareas">
            <input type="text" id="nuevaTareaInput" placeholder="Escribe una tarea..." autofocus>
            <button id="botonAgregar">Agregar</button>
        </div>
        <ul id="listaDeTareas"></ul>
        <p class="contador">Total: <span id="contadorTareas">0</span> tareas</p>
    </main>
    <footer>
        <p>Desarrollado por <strong>Ludwing Silva</strong></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
